<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beni Yakala</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1129 100%);
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card {
      background: linear-gradient(180deg, #1e2335 0%, #151a2b 100%);
      border: 1px solid #2a3142;
      border-radius: 12px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
      max-width: 520px;
      width: 90%;
      padding: 32px;
      position: relative;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 0.9rem;
      color: #8892a6;
      margin-bottom: 24px;
    }
    #playArea {
      position: relative;
      width: 100%;
      height: 280px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      border: 1px dashed #2a3142;
    }
    .btn-catch {
      position: absolute;
      padding: 16px 32px;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(180deg, #00c853, #009624);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 200, 83, 0.45);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-catch:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(0, 200, 83, 0.55);
    }
    .btn-catch.caught {
      cursor: default;
      position: static;
      margin-top: 12px;
    }
    #result {
      display: none;
      margin-top: 20px;
      padding: 18px 24px;
      background: rgba(255, 68, 68, 0.15);
      border: 1px solid rgba(255, 68, 68, 0.4);
      border-radius: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Beni Yakala</h1>
    <p class="sub">Butona tıkla — kaçıyor ama yakalanabilir 🎯</p>
    <div id="playArea">
      <button type="button" class="btn-catch" id="catchBtn">Beni Yakala</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    const playArea = document.getElementById('playArea');
    const catchBtn = document.getElementById('catchBtn');
    const resultEl = document.getElementById('result');

    let caught = false;
    let runDelay = 180;

    function randomPosition() {
      const rect = playArea.getBoundingClientRect();
      const btnRect = catchBtn.getBoundingClientRect();
      const padding = 16;
      const maxX = rect.width - btnRect.width - padding * 2;
      const maxY = rect.height - btnRect.height - padding * 2;
      const x = padding + Math.random() * Math.max(0, maxX);
      const y = padding + Math.random() * Math.max(0, maxY);
      return { x, y };
    }

    function moveButton() {
      if (caught) return;
      const pos = randomPosition();
      catchBtn.style.left = pos.x + 'px';
      catchBtn.style.top = pos.y + 'px';
    }

    let moveTimer = null;
    catchBtn.addEventListener('mouseenter', () => {
      if (caught) return;
      moveTimer = setTimeout(moveButton, runDelay);
    });
    catchBtn.addEventListener('mouseleave', () => {
      if (moveTimer) clearTimeout(moveTimer);
    });

    catchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (caught) return;
      caught = true;
      if (moveTimer) clearTimeout(moveTimer);
      catchBtn.classList.add('caught');
      catchBtn.textContent = 'Yakaladın!';
      resultEl.textContent = "Ahmet'in amınakoyayım";
      resultEl.style.display = 'block';
    });

    moveButton();
  </script>
</body>
</html>
